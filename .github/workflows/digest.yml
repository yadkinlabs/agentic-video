name: Digest

on:
  schedule:
    - cron: "0 8 * * *"  # 8am UTC daily
  workflow_dispatch:       # allow manual trigger

permissions:
  issues: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: yadkinlabs/agentic-oss@v1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          mode: digest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
