name: Stale

on:
  schedule:
    - cron: "0 2 * * *"  # 2am UTC daily
  workflow_dispatch:       # allow manual trigger

permissions:
  issues: write

jobs:
  stale:
    runs-on: ubuntu-latest
    steps:
      - uses: yadkinlabs/agentic-oss@v1
        with:
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          mode: stale
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
